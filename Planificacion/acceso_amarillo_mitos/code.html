<div class="relative">
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-4 px-4 text-white placeholder:text-white/20 focus:outline-none focus:ring-1 focus:ring-mustard focus:border-mustard transition-all input-focus" id="email" placeholder="tu@correo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-mustard/80 uppercase tracking-widest" for="password">Contraseña</label>
<a class="text-xs text-mustard hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-4 px-4 text-white placeholder:text-white/20 focus:outline-none focus:ring-1 focus:ring-mustard focus:border-mustard transition-all input-focus" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-5 h-5 rounded border-mustard/40 bg-transparent text-mustard focus:ring-mustard focus:ring-offset-background-dark" id="remember" type="checkbox"/>
<label class="ml-3 text-white/70 text-base" for="remember">Recordarme en este dispositivo</label>
</div>
<!-- Login Button -->
<button class="w-full bg-mustard hover:bg-mustard/80 text-background-dark font-bold py-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-mustard/20 uppercase tracking-widest flex items-center justify-center gap-2" type="submit">
                        Iniciar Sesión
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Registration Prompt -->
<div class="mt-10 pt-8 border-t border-white/5 text-center">
<p class="text-white/50 text-base">
                        ¿No tienes cuenta?

</p>

<span class="material-symbols-outlined text-4xl">star</span>
